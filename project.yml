name: Sugarbar

options:
  minimumXcodeGenVersion: "2.45.4"
  bundleIdPrefix: com.sugarbar
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"

packages:
  SugarbarCore:
    path: .

targets:
  Sugarbar:
    type: application
    platform: macOS
    sources:
      - path: Sources/Sugarbar
      - path: packaging/AppIcon.icns
        buildPhase: resources
    dependencies:
      - package: SugarbarCore
        product: SugarbarCore
    settings:
      base:
        PRODUCT_NAME: Sugarbar
        PRODUCT_BUNDLE_IDENTIFIER: com.sugarbar.Sugarbar
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: packaging/Info.plist
        CODE_SIGN_ENTITLEMENTS: packaging/Sugarbar.entitlements

schemes:
  Sugarbar:
    build:
      targets:
        Sugarbar: all
    run:
      config: Debug
    archive:
      config: Release
